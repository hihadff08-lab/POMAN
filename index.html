<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>عدو فضائي</title>

<style>
body{
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.enemy{
    position:relative;
    width:120px;
    height:90px;
}

.body{
    position:absolute;
    width:70px;
    height:60px;
    background:#ff3333;
    left:25px;
    top:15px;
    border-radius:20px 20px 10px 10px;
}

.eye{
    position:absolute;
    width:12px;
    height:12px;
    background:yellow;
    border-radius:50%;
    top:25px;
}

.eye.left{
    left:45px;
}

.eye.right{
    right:45px;
}

.wing{
    position:absolute;
    width:30px;
    height:15px;
    background:#990000;
    top:35px;
}

.leftWing{
    left:0;
    transform:skewY(20deg);
}

.rightWing{
    right:0;
    transform:skewY(-20deg);
}

.antenna{
    position:absolute;
    width:4px;
    height:20px;
    background:white;
    top:0;
}

.ant1{
    left:45px;
    transform:rotate(-20deg);
}

.ant2{
    right:45px;
    transform:rotate(20deg);
}

.ball{
    position:absolute;
    width:8px;
    height:8px;
    background:cyan;
    border-radius:50%;
    top:-5px;
}

.ball.left{
    left:-2px;
}

.ball.right{
    right:-2px;
}
</style>

</head>
<body>

<div class="enemy">

<div class="antenna ant1">
<div class="ball left"></div>
</div>

<div class="antenna ant2">
<div class="ball right"></div>
</div>

<div class="wing leftWing"></div>
<div class="wing rightWing"></div>

<div class="body"></div>

<div class="eye left"></div>
<div class="eye right"></div>

</div>

</body>
</html>
